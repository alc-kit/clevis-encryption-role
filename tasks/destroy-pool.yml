---
# Destroys the ZFS pool and wipes filesystem signatures from the underlying
# devices.  Called from tasks/main.yml when clevis_destroy_existing is true.
#
# Note: Proxmox storage unregistration is intentionally NOT part of this
# role.  Callers that need it (install-proxmox.yml, destroy-encryption.yml)
# must invoke proxmox-install's unregister-zfs-storage task BEFORE running
# this destroy flow.
#
# Expects in scope:
#   target_pool — name of the ZFS pool to destroy
#
# Idempotent: zpool destroy + wipefs only run when the pool exists.

# --- PHASE 1: Gather pool and disk information ---
- name: "Check whether ZFS pool exists on the OS: {{ target_pool }}"
  ansible.builtin.command: "zpool list {{ target_pool }}"
  register: zpool_check
  failed_when: false
  changed_when: false
  check_mode: false

- name: "Get list of devices used by the ZFS pool"
  # -P returns full physical paths; awk isolates lines starting with /dev/.
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      zpool status -P {{ target_pool }} | awk '$1 ~ /^\/dev\// {print $1}'
    executable: /bin/bash
  register: zpool_devices
  when: zpool_check.rc == 0
  changed_when: false
  check_mode: false

# --- PHASE 2: Destroy pool and wipe disks ---
- name: "Destroy the ZFS pool: {{ target_pool }}"
  ansible.builtin.command: "zpool destroy {{ target_pool }}"
  changed_when: true
  when: zpool_check.rc == 0

- name: "Wipe filesystem signatures from former ZFS devices"
  ansible.builtin.command: "wipefs -a {{ item }}"
  loop: "{{ zpool_devices.stdout_lines | default([]) }}"
  changed_when: true
  when: zpool_check.rc == 0
