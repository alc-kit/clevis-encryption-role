---
# roles/pve_destroy_zpool/tasks/main.yml

# --- PHASE 1: Remove from Proxmox Configuration ---
- name: "Remove Proxmox storage definition for {{ target_pool }}"
  community.proxmox.proxmox_storage:
    api_host: "{{ ansible_host | default(inventory_hostname) }}"
    api_user: "{{ proxmox_user }}"
    api_password: "{{ proxmox_password }}"
    validate_certs: "{{ proxmox_validate_certs | default(false) }}"
    name: "{{ target_pool }}"
    state: absent
  delegate_to: localhost
  become: false
  failed_when: false   # storage may already be gone — destroy is idempotent at this layer

# --- PHASE 2: Gather pool and disk information ---
- name: Check if ZFS pool '{{ target_pool }}' exists on the OS
  ansible.builtin.command: "zpool list {{ target_pool }}"
  register: zpool_check
  failed_when: false
  changed_when: false
  check_mode: false

- name: Get list of devices used by the ZFS pool
  # We use -P for full physical paths, and awk to isolate lines starting with /dev/
  ansible.builtin.shell: "zpool status -P {{ target_pool }} | awk '$1 ~ /^\\/dev\\// {print $1}'"
  register: zpool_devices
  when: zpool_check.rc == 0
  changed_when: false
  check_mode: false

# --- PHASE 3: Destroy pool and wipe disks ---
- name: Destroy the ZFS pool '{{ target_pool }}'
  ansible.builtin.command: "zpool destroy {{ target_pool }}"
  when: zpool_check.rc == 0

- name: Wipe filesystem signatures from the former ZFS devices
  ansible.builtin.command: "wipefs -a {{ item }}"
  loop: "{{ zpool_devices.stdout_lines | default([]) }}"
  when: zpool_check.rc == 0

