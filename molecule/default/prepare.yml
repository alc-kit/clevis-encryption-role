---
# Sets up the container before the role is applied.  Tier-1 (container) test:
# everything a privileged container can do — NO ZFS, NO real boot.
#
# What this does:
#   1. Installs LUKS/clevis/tang/jose tooling.
#   2. Stands up a LOCAL Tang on 127.0.0.1:7500 (IPv4-only — makes the role's
#      `clevis_curl_ip_version: auto` probe deterministically resolve to ipv4).
#   3. Creates /dev/loop0, LUKS2-formats it, clevis-binds it to the local Tang,
#      and opens it as crypt-loop0 (so configure-disk's live-discard apply has a
#      real clevis-bound, open mapper to refresh).
#   4. PLANTS legacy artifacts — both role-OWNED (carry the ownership header or a
#      distinctive signature) and FOREIGN look-alikes (same name, no signature) —
#      so verify.yml can prove cleanup-legacy removes ours and preserves theirs.
#   5. Writes a fake recovery key so the provisioning block is skipped (only
#      cleanup + prestage + boot-ordering run; provisioning needs ZFS).
#
# The clevis unlock -o / refresh behaviour itself is validated by the vendored
# files/harness-unlock-o.sh, run from verify.yml against its OWN loop device.

- name: "Prepare container for clevis-encryption Molecule test"
  hosts: all
  gather_facts: false
  become: true

  vars:
    tang_port: 7500

  tasks:

    - name: "Install test dependencies"
      ansible.builtin.apt:
        name:
          - cryptsetup
          - dmsetup
          - util-linux
          - zfsutils-linux
          - clevis
          - clevis-luks
          - tang
          - jose
          - jq
          - curl
          - keyutils
        state: present
        update_cache: true

    # ── Local Tang on 127.0.0.1:7500 (IPv4-only) ─────────────────────────────
    - name: "Create tangd.socket drop-in directory"
      ansible.builtin.file:
        path: /etc/systemd/system/tangd.socket.d
        state: directory
        mode: '0755'

    - name: "Pin tangd.socket to IPv4 loopback port {{ tang_port }}"
      ansible.builtin.copy:
        dest: /etc/systemd/system/tangd.socket.d/listen.conf
        mode: '0644'
        content: |
          [Socket]
          ListenStream=
          ListenStream=127.0.0.1:{{ tang_port }}

    - name: "Generate Tang signing keys (once)"
      ansible.builtin.shell:
        cmd: |
          set -eo pipefail
          kg=$(command -v tangd-keygen 2>/dev/null || dpkg -L tang | grep -m1 'tangd-keygen$')
          mkdir -p /var/db/tang
          ls /var/db/tang/*.jwk >/dev/null 2>&1 || "$kg" /var/db/tang
        executable: /bin/bash
      changed_when: true

    - name: "Enable + (re)start tangd.socket"
      ansible.builtin.systemd:
        name: tangd.socket
        enabled: true
        state: restarted
        daemon_reload: true

    - name: "Wait for Tang to answer /adv"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ tang_port }}/adv"
        status_code: 200
      register: _tang_adv
      retries: 10
      delay: 1
      until: _tang_adv.status == 200

    # ── Loopback LUKS2 data disk, clevis-bound to the local Tang ──────────────
    - name: "Create 256 MB backing file for loopback LUKS device"
      ansible.builtin.command: dd if=/dev/zero of=/tmp/luks_test.img bs=1M count=256
      args:
        creates: /tmp/luks_test.img

    - name: "Attach backing file as /dev/loop0"
      ansible.builtin.command: losetup /dev/loop0 /tmp/luks_test.img
      args:
        creates: /dev/loop0

    - name: "Write the LUKS passphrase to a key file"
      ansible.builtin.copy:
        dest: /root/molecule_luks.key
        content: "molecule-test"
        mode: '0600'

    - name: "Format /dev/loop0 as LUKS2 (fast pbkdf for tests)"
      ansible.builtin.command: >-
        cryptsetup luksFormat --type luks2 --batch-mode
        --pbkdf pbkdf2 --pbkdf-force-iterations 1000
        /dev/loop0 /root/molecule_luks.key
      args:
        creates: /dev/mapper/crypt-loop0

    - name: "Check whether /dev/loop0 is already clevis-bound"
      ansible.builtin.command: clevis luks list -d /dev/loop0
      register: _clevis_list
      changed_when: false
      failed_when: false

    - name: "Clevis-bind /dev/loop0 to the local Tang"
      ansible.builtin.shell:
        cmd: >-
          clevis luks bind -y -d /dev/loop0 -k /root/molecule_luks.key
          tang '{"url":"http://127.0.0.1:{{ tang_port }}"}'
        executable: /bin/bash
      when: "'tang' not in (_clevis_list.stdout | default(''))"
      changed_when: true

    - name: "Open LUKS device as crypt-loop0 (no discard yet — role applies it)"
      ansible.builtin.command: >-
        cryptsetup luksOpen --key-file /root/molecule_luks.key
        /dev/loop0 crypt-loop0
      args:
        creates: /dev/mapper/crypt-loop0

    # ── Plant legacy artifacts for the cleanup-legacy content-guard test ──────
    # OWNED (must be REMOVED): carry the ownership header or a distinctive
    # signature this role always wrote.
    - name: "Plant OWNED legacy unit dirs"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - /etc/systemd/system/clevis-luks-askpass.service.wants
        - /etc/systemd/system/zfs-import-cache.service.d
        - /etc/systemd/system/zfs-import-scan.service.d
        - /etc/systemd/system/networking.service.d

    - name: "Plant OWNED clevis-network-ready.service (Tier 1: by-name)"
      ansible.builtin.copy:
        dest: /etc/systemd/system/clevis-network-ready.service
        mode: '0644'
        content: |
          # Managed by Ansible role: clevis_encryption — https://github.com/KvalitetsIT/clevis-encryption-role
          [Unit]
          Description=LEGACY clevis-network-ready (planted by molecule prepare)
          [Service]
          Type=oneshot
          RemainAfterExit=yes
          ExecStart=/bin/true
          [Install]
          WantedBy=clevis-luks-askpass.service

    - name: "Plant OWNED clevis-network-ready .wants symlink"
      ansible.builtin.file:
        src: /etc/systemd/system/clevis-network-ready.service
        dest: /etc/systemd/system/clevis-luks-askpass.service.wants/clevis-network-ready.service
        state: link
        force: true

    - name: "Plant /etc/gai.conf with the OWNED ipv4-only block + UNRELATED operator content"
      ansible.builtin.copy:
        dest: /etc/gai.conf
        mode: '0644'
        content: |
          # operator content that MUST survive cleanup
          label ::1/128 0
          # BEGIN ANSIBLE MANAGED clevis-encryption ipv4-only
          precedence ::ffff:0:0/96  100
          precedence ::/0           1
          # END ANSIBLE MANAGED clevis-encryption ipv4-only

    - name: "Plant OWNED zfs-import-cache override.conf (signature: clevis-unlock-data)"
      ansible.builtin.copy:
        dest: /etc/systemd/system/zfs-import-cache.service.d/override.conf
        mode: '0644'
        content: |
          [Unit]
          Requires=clevis-unlock-data.service
          After=clevis-unlock-data.service

    - name: "Plant OWNED networking 10-override.conf (signature: ifupdown2-pre.service sysinit.target)"
      ansible.builtin.copy:
        dest: /etc/systemd/system/networking.service.d/10-override.conf
        mode: '0644'
        content: |
          [Unit]
          After=network-pre.target apparmor.service ifupdown2-pre.service sysinit.target

    - name: "Plant OWNED 99-ipv6_disable.conf (signature: disable_ipv6)"
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-ipv6_disable.conf
        mode: '0644'
        content: |
          net.ipv6.conf.default.disable_ipv6 = 1
          net.ipv6.conf.all.disable_ipv6 = 1

    # FOREIGN (must be PRESERVED): same name, no role signature/header.
    - name: "Plant FOREIGN zfs-import-scan override.conf (no signature — must survive)"
      ansible.builtin.copy:
        dest: /etc/systemd/system/zfs-import-scan.service.d/override.conf
        mode: '0644'
        content: |
          [Service]
          Nice=-5

    - name: "Reload systemd so it sees the planted units before converge"
      ansible.builtin.systemd:
        daemon_reload: true

    # ── Skip the provisioning block (it needs ZFS) ───────────────────────────
    - name: "Create fake recovery key so provisioning block is skipped"
      ansible.builtin.copy:
        dest: /tmp/molecule_recovery_key.txt
        content: "molecule-test-recovery-key\n"
        mode: '0600'
      delegate_to: localhost
      become: false
