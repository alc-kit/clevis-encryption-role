---
# Applies the clevis-encryption role to the container instance.
#
# The provisioning block is automatically skipped because:
#   - prepare.yml already wrote /tmp/molecule_recovery_key.txt
#   - clevis_recovery_key_path points there via host_vars in molecule.yml
#   - the stat task finds the file exists, so clevis_recovery_key_stat.stat.exists = true
#
# cleanup-legacy + prestage + boot-ordering run (provisioning needs ZFS, skipped):
#   - cleanup-legacy removes planted OWNED artifacts, preserves FOREIGN ones
#   - curlrc auto-probe pins --ipv4 (local Tang is IPv4-only)
#   - /etc/crypttab entry for loop0
#   - configure-disk live-apply enables discards on the open crypt-loop0 mapper
#   - clevis-luks-askpass network-online drop-in

- name: "Converge"
  hosts: all
  become: true
  gather_facts: true

  roles:
    - role: clevis_encryption
