---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: clevis-encryption-debian13
    image: geerlingguy/docker-debian13-ansible:latest
    pre_build_image: true
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /lib/systemd/systemd
    # The container needs /dev/loop* and /dev/mapper/* for LUKS/dm-crypt.
    # These are created by the prepare playbook using losetup + cryptsetup.
    devices:
      - /dev/loop-control:/dev/loop-control
    capabilities:
      - SYS_ADMIN
      - NET_ADMIN
      - MKNOD
    tmpfs:
      - /run
      - /run/lock
      - /tmp

provisioner:
  name: ansible
  config_options:
    defaults:
      interpreter_python: auto_silent
  inventory:
    host_vars:
      clevis-encryption-debian13:
        # Pre-set the disk list so the discovery task is skipped.
        # The prepare playbook creates /dev/loop0 as a LUKS2 device.
        clevis_raw_disks:
          - loop0
        # Use a path inside the container so the delegate_to: localhost tasks
        # write to the Molecule temp directory rather than a real inventory.
        clevis_recovery_key_path: "/tmp/molecule_recovery_key.txt"
        # Tang server is mocked — provisioning block is skipped because the
        # recovery key file is pre-created by the prepare playbook.
        tang_servers:
          - url: "http://127.0.0.1:7500"
        # auto-probe: prepare.yml runs a real Tang on 127.0.0.1:7500 bound to IPv4
        # only, so the probe sees v4 OK / v6 FAIL and deterministically pins ipv4
        # — exercising the real detection path, not just the curlrc write.
        clevis_curl_ip_version: auto
        clevis_register_proxmox_storage: false
        clevis_vault_password_file: "/dev/null"
        # ZFS is the higher-level consumer of the LUKS/Clevis devices and is out
        # of scope for the container test (it cannot build the ZFS kernel module).
        # Skip both the ZFS package install (prestage) and pool management.
        clevis_install_zfs_packages: false
        clevis_ensure_pool: false

verifier:
  name: ansible
