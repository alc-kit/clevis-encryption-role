---
# Tier-2 (VM) preparation, in three parts:
#   1. clevis-tang   : stand up the EXTERNAL Tang server, reachable on the NAT
#                      network at 0.0.0.0:7500 (so the target can reach it).
#   2. clevis-target : platform prep that is OUT of the role's scope — make the
#                      box able to build + load the ZFS kernel module (contrib +
#                      DKMS chain + matching headers), mirroring the old
#                      manual_test/cloud-init platform prep.
#   3. controller    : generate a throwaway vault password and REMOVE any stale
#                      recovery key so the role's provisioning block runs fresh.
#
# The clevis-encryption role itself (clevis install, LUKS format/bind, ZFS pool,
# boot-ordering units) is applied afterwards by converge.yml — that is the thing
# under test, exercised for real and then across a reboot.

# ── 1. External Tang server ──────────────────────────────────────────────────
- name: "Prepare the external Tang server"
  hosts: clevis-tang
  gather_facts: false
  become: true
  vars:
    tang_port: 7500
  tasks:
    - name: "Install Tang"
      ansible.builtin.apt:
        name:
          - tang
          - curl
        state: present
        update_cache: true

    - name: "Create tangd.socket drop-in directory"
      ansible.builtin.file:
        path: /etc/systemd/system/tangd.socket.d
        state: directory
        mode: '0755'

    - name: "Bind tangd.socket to all interfaces on port {{ tang_port }}"
      # The target reaches Tang over the NAT network, so bind 0.0.0.0 (not the
      # loopback-only pin the container tiers use).  IPv4 only: the target's Tang
      # URL is an IPv4 literal, so the role's --ipv6 auto-probe still fails and
      # pins --ipv4 deterministically.
      ansible.builtin.copy:
        dest: /etc/systemd/system/tangd.socket.d/listen.conf
        mode: '0644'
        content: |
          [Socket]
          ListenStream=
          ListenStream=0.0.0.0:{{ tang_port }}

    - name: "Generate Tang signing keys (once)"
      # tang 15 (Debian 13) ships tangd-keygen in tang-common under /usr/libexec
      # (off $PATH); locate it robustly.  tangd only serves keys already present
      # in /var/db/tang, so this must succeed before /adv answers.
      ansible.builtin.shell:
        cmd: |
          set -eo pipefail
          kg=$(command -v tangd-keygen 2>/dev/null || true)
          [ -n "$kg" ] || kg=$(dpkg -L tang tang-common 2>/dev/null | grep -m1 '/tangd-keygen$' || true)
          [ -n "$kg" ] || kg=$(find /usr/libexec /usr/lib /usr/bin -name tangd-keygen 2>/dev/null | head -n1)
          [ -n "$kg" ] || { echo "tangd-keygen not found" >&2; exit 1; }
          mkdir -p /var/db/tang
          if ! ls /var/db/tang/*.jwk >/dev/null 2>&1; then
            "$kg" /var/db/tang
            echo CHANGED
          fi
        executable: /bin/bash
      register: _tang_keygen
      changed_when: "'CHANGED' in _tang_keygen.stdout"

    - name: "Enable + (re)start tangd.socket"
      ansible.builtin.systemd:
        name: tangd.socket
        enabled: true
        state: restarted
        daemon_reload: true

    - name: "Wait for Tang to answer /adv locally"
      ansible.builtin.uri:
        url: "http://127.0.0.1:{{ tang_port }}/adv"
        status_code: 200
      register: _tang_adv
      retries: 10
      delay: 1
      until: _tang_adv.status == 200

# ── 2. Encrypted host: ZFS platform prep (out of the role's scope) ───────────
- name: "Prepare the encrypted host (ZFS build chain)"
  hosts: clevis-target
  gather_facts: true
  become: true
  tasks:
    - name: "Enable the contrib component (zfs-dkms lives there)"
      # zfs-dkms is in `contrib`.  Drop in a dedicated source file rather than
      # regex-editing the base list — the debian/trixie64 box uses old-style
      # /etc/apt/sources.list (deb ... trixie main), not DEB822 debian.sources,
      # so this stays correct regardless of the box's base format and is idempotent.
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/contrib.list
        mode: '0644'
        content: |
          deb https://deb.debian.org/debian trixie contrib
          deb https://deb.debian.org/debian trixie-updates contrib

    - name: "Install the DKMS build chain + matching kernel headers"
      ansible.builtin.apt:
        name:
          - build-essential
          - dkms
          - gdisk
          - "linux-headers-{{ ansible_facts.kernel }}"
        state: present
        update_cache: true

    - name: "Install ZFS (DKMS build + userland)"
      ansible.builtin.apt:
        name:
          - zfs-dkms
          - zfsutils-linux
        state: present

    - name: "Load the ZFS kernel module"
      community.general.modprobe:
        name: zfs
        state: present

# ── 3. Controller: vault password + fresh recovery-key gate ──────────────────
- name: "Prepare the controller (vault pass + recovery-key gate)"
  hosts: clevis-target
  gather_facts: false
  tasks:
    - name: "Ensure the controller secrets directory exists"
      ansible.builtin.file:
        path: /tmp/molecule-vm-secrets
        state: directory
        mode: '0700'
      delegate_to: localhost
      become: false

    - name: "Generate a throwaway vault password on the controller"
      ansible.builtin.copy:
        dest: /tmp/molecule-vm-secrets/vault-pass
        content: "{{ lookup('ansible.builtin.password', '/dev/null', length=32) }}\n"
        mode: '0600'
      delegate_to: localhost
      become: false

    - name: "Remove any stale recovery key so provisioning runs fresh"
      ansible.builtin.file:
        path: /tmp/molecule-vm-secrets/recovery-key.txt
        state: absent
      delegate_to: localhost
      become: false
